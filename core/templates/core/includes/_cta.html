<section class="section cta-section reveal">
    <div class="container cta-box js-tilt">
        <div class="cta-copy">
            <span class="eyebrow">Contacto comercial</span>
            <h2>Si tu operación requiere orden y respuesta, conversemos.</h2>
            <p>
                Comparte origen, destino, tipo de carga o contexto operacional. El canal comercial está
                preparado para responder con más claridad desde el primer contacto.
            </p>

            <div class="cta-actions">
                <a
                    href="https://wa.me/{{ whatsapp_number }}?text={{ whatsapp_text|urlencode }}"
                    class="btn btn-primary"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    Abrir canal comercial
                </a>
                <a href="#contacto" class="btn btn-secondary">Completar formulario</a>
            </div>
        </div>
    </div>
</section>
