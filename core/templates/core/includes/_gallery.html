{% load static %}

<section class="section section-light gallery-section reveal" id="galeria">
    <div class="container">
        <div class="section-heading section-heading-compact gallery-heading reveal">
            <span class="eyebrow">Registro visual</span>
            <h2>Operaciones reales que respaldan cómo trabaja TRAVESÍA.</h2>
            <p>

                cargas y operaciones que la empresa coordina en terreno.
            </p>

                data-gallery-caption="Registro de operación real con foco en coordinación, cumplimiento y ejecución en ruta."

                    src="{% static 'core/img/pages/nosotros/nosotros-operacion-logistica-travesia.webp' %}"
                    alt="Operación logística real de TRAVESÍA"
                    class="gallery-card-image"
                    width="1280"
                    height="960"
                    loading="lazy"
                    decoding="async"
                >
                <span class="gallery-card-overlay">
                    <span class="gallery-card-kicker">Operación real</span>
                    <strong>Ver operación</strong>
                </span>
            </button>

<div class="gallery-modal" id="galleryModal" aria-hidden="true">
    <div class="gallery-modal-backdrop" data-gallery-close></div>
    <div class="gallery-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="galleryModalTitle">
        <button type="button" class="gallery-modal-close" data-gallery-close aria-label="Cerrar galería">×</button>
        <div class="gallery-modal-media">
            <img id="galleryModalImage" src="" alt="" class="gallery-modal-image">
        </div>
        <div class="gallery-modal-copy">
            <span class="gallery-modal-kicker">Operación real</span>
            <h3 id="galleryModalTitle"></h3>
